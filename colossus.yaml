# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# SINGLE-CONTAINER build. The k8s Deployment runs exactly one container on port 80
# (no separate `backend` Service exists), so the app is packaged as one image built from
# the root Dockerfile: a multi-stage build where Node compiles the React SPA (web/) and a
# Python image serves both the built SPA (StaticFiles + SPA deep-link catch-all) and the
# /api/* JSON API via uvicorn on :80. The ingress strips the /{{IMAGE_NAME}} prefix.
framework: dockerfile
projectName: e2e-lane-fastapi-react
dockerfile: Dockerfile
context: .
port: 80
# The SPA is built with Vite base = /{{IMAGE_NAME}}/ (hardcoded in the root Dockerfile as
# the ingress prefix for this lane) so asset URLs resolve under the ingress prefix.
baseHref: "/{{IMAGE_NAME}}/"
spaFallback: true
healthcheck: /api/health
