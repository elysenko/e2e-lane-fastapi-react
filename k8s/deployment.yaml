apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-lane-fastapi-react
  namespace: colossus-e2e-lane-fastapi-react
  labels:
    app: e2e-lane-fastapi-react
    managed-by: colossus
spec:
  replicas: 1
  # Recreate (NOT the default RollingUpdate): the per-project namespace has a hard
  # memory ResourceQuota. A RollingUpdate creates the new pod before terminating the
  # old one, transiently needing 2x the pod's memory — which the quota denies, so the
  # rollout stalls with ProgressDeadlineExceeded. Kill-before-create is correct for a
  # single-replica staging app (a few seconds of downtime is acceptable).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: e2e-lane-fastapi-react
  template:
    metadata:
      labels:
        app: e2e-lane-fastapi-react
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/e2e-lane-fastapi-react:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
          # Liveness: static /api/health (never touches the DB) so a transient DB outage
          # does not kill the pod. Probes hit the pod directly, so no ingress prefix.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness: deep check (SELECT 1) so the pod leaves the Service rotation while
          # the database is unreachable, then rejoins once it recovers.
          readinessProbe:
            httpGet:
              path: /api/health/deep
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Startup: give the app time to boot + run init_db before liveness kicks in.
          startupProbe:
            httpGet:
              path: /api/health
              port: 80
            periodSeconds: 5
            failureThreshold: 30
